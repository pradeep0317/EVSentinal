<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Sentinel | Full Control Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: #cbd5e1; }
    .glass-card { background: rgba(23, 32, 53, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
    .input-group { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; }
    input[type="range"] { accent-color: #38bdf8; }
    select { background: #1e293b !important; color: white; border: none; outline: none; }
  </style>
</head>

<body class="p-4 md:p-6">

<div class="max-w-[1600px] mx-auto">
  <header class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white tracking-tight italic">⚡ EV DIGITAL TWIN PRO</h1>
      <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Full API Integration Dashboard</p>
    </div>
    <div id="status" class="text-[10px] font-black px-4 py-1 bg-sky-500/10 text-sky-400 border border-sky-500/20 rounded-full uppercase tracking-widest">
      ● Unity Engine Connected
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <aside class="lg:col-span-4 space-y-4">
      <div class="glass-card p-5">
        <h3 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest">Drive Configuration (API Input)</h3>

        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Speed (km/h)</label>
              <input id="speed" type="number" value="40" class="bg-transparent text-white font-bold w-full outline-none text-lg">
            </div>
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Drive Hours</label>
              <input id="drivingHours" type="number" value="1.5" step="0.1" class="bg-transparent text-white font-bold w-full outline-none text-lg">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Load (kg)</label>
              <input id="loadWeight" type="number" value="150" class="bg-transparent text-white font-bold w-full outline-none text-lg">
            </div>
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Time of Day (0-24)</label>
              <input id="timeOfDay" type="range" min="0" max="24" value="12" class="w-full mt-2">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Slope</label>
              <select id="slope" class="w-full bg-transparent text-xs font-bold">
                <option value="0">Flat (0)</option>
                <option value="1">Uphill (1)</option>
                <option value="2">Downhill (2)</option>
              </select>
            </div>
            <div class="input-group">
              <label class="text-[9px] font-bold text-slate-500 block mb-1 uppercase">Env (Climate)</label>
              <select id="environment" class="w-full bg-transparent text-xs font-bold">
                <option value="3">Normal (3)</option>
                <option value="0">Summer (0)</option>
                <option value="1">Winter (1)</option>
                <option value="2">Rain (2)</option>
              </select>
            </div>
          </div>

          <div class="flex justify-between items-center px-2 py-2 border-t border-white/5">
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="vehicleOn" type="checkbox" checked class="accent-sky-500">
              <span class="text-[10px] font-bold uppercase">Vehicle Power</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="isCharging" type="checkbox" class="accent-emerald-500">
              <span class="text-[10px] font-bold uppercase">Charging Mode</span>
            </label>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="glass-card p-4 text-center">
          <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Battery SOC</p>
          <div class="text-2xl font-bold text-white"><span id="outSoc">--</span>%</div>
        </div>
        <div class="glass-card p-4 text-center">
          <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Temperature</p>
          <div class="text-2xl font-bold text-rose-500"><span id="outTemp">--</span>°C</div>
        </div>
      </div>
    </aside>

    <main class="lg:col-span-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="glass-card p-6 h-[480px] flex flex-col shadow-2xl">
          <div class="mb-6 flex justify-between items-center">
            <div>
              <h3 class="text-sm font-bold text-white uppercase tracking-wider">Capacity vs Range Co-relation</h3>
              <p class="text-[10px] text-slate-500">SOC % vs Continuous Range KM</p>
            </div>
          </div>
          <div class="flex-grow">
            <canvas id="rangeChart"></canvas>
          </div>
        </div>

        <div class="glass-card p-6 h-[480px] flex flex-col shadow-2xl">
          <div class="mb-6">
            <h3 class="text-sm font-bold text-white uppercase tracking-wider">Live Drain Analytics</h3>
            <p class="text-[10px] text-slate-500">Battery Stress (batteryDrainRate) vs Time</p>
          </div>
          <div class="flex-grow">
            <canvas id="drainChart"></canvas>
          </div>
        </div>

      </div>
    </main>

  </div>
</div>

<script>
  let history = { labels: [], soc: [], range: [], drain: [] };

  // Chart 1: Capacity vs Range
  const rangeCtx = document.getElementById('rangeChart').getContext('2d');
  const rangeChart = new Chart(rangeCtx, {
    type: 'line',
    data: {
      labels: history.labels,
      datasets: [
        { label: 'SOC %', data: history.soc, borderColor: '#38bdf8', borderWidth: 3, pointRadius: 0, tension: 0.3, yAxisID: 'y' },
        { label: 'Range (KM)', data: history.range, borderColor: '#10b981', borderWidth: 2, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)', tension: 0.3, pointRadius: 0, yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } },
        y: { position: 'left', title: { display: true, text: 'SOC %' }, min: 0, max: 105, ticks: { color: '#38bdf8' } },
        y1: { position: 'right', title: { display: true, text: 'Range (KM)' }, grid: { display: false }, ticks: { color: '#10b981' } }
      },
      plugins: { legend: { display: false } }
    }
  });

  // Chart 2: Drain Rate
  const drainCtx = document.getElementById('drainChart').getContext('2d');
  const drainChart = new Chart(drainCtx, {
    type: 'line',
    data: {
      labels: history.labels,
      datasets: [{
        label: 'Drain Rate',
        data: history.drain,
        borderColor: '#f59e0b',
        backgroundColor: 'rgba(245, 158, 11, 0.1)',
        fill: true,
        borderWidth: 3,
        pointRadius: 2,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } },
        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#f59e0b' } }
      },
      plugins: { legend: { display: false } }
    }
  });

  // 📡 FETCH DATA FROM UNITY
  function updateDashboard() {
    fetch("http://localhost:3000/output")
            .then(res => res.json())
            .then(d => {
              if (!d.batteryCapacity && d.batteryCapacity !== 0) return;

              // UI Updates
              document.getElementById("outSoc").innerText = d.batteryCapacity.toFixed(1);
              document.getElementById("outTemp").innerText = d.currentTemp.toFixed(1);

              // Update Charts
              let timeLabel = new Date().toLocaleTimeString([], { minute: '2-digit', second: '2-digit' });
              history.labels.push(timeLabel);
              history.soc.push(d.batteryCapacity);
              history.range.push(d.continuousRange);
              history.drain.push(d.batteryDrainRate);

              if (history.labels.length > 20) {
                history.labels.shift();
                history.soc.shift();
                history.range.shift();
                history.drain.shift();
              }

              rangeChart.update('none');
              drainChart.update('none');
            });
  }

  // 📤 SEND DATA TO UNITY (Full API Structure)
  function sendToUnity() {
    const payload = {
      speed: parseFloat(document.getElementById("speed").value),
      drivingHours: parseFloat(document.getElementById("drivingHours").value),
      loadWeight: parseFloat(document.getElementById("loadWeight").value),
      vehicleOn: document.getElementById("vehicleOn").checked,
      slope: parseInt(document.getElementById("slope").value),
      environment: parseInt(document.getElementById("environment").value),
      timeOfDay: parseFloat(document.getElementById("timeOfDay").value),
      isCharging: document.getElementById("isCharging").checked
    };

    fetch("http://localhost:3000/data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).catch(e => console.log("Unity offline"));
  }

  // Listeners for all inputs
  document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", sendToUnity);
  });

  setInterval(updateDashboard, 1000);
</script>
</body>
</html>
