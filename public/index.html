<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Sentinel | Full Control Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: #cbd5e1; }
    .glass-card { background: rgba(23, 32, 53, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
    .input-group { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; }
    input[type="range"] { accent-color: #38bdf8; }
    select { background: #1e293b !important; color: white; border: none; outline: none; }
  </style>
</head>

<body class="p-4 md:p-6">

<div class="max-w-[1600px] mx-auto">
  <header class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white tracking-tight italic">⚡ EV DIGITAL TWIN PRO</h1>
      <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Full API Integration Dashboard</p>
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- LEFT PANEL -->
    <aside class="lg:col-span-4 space-y-4">
      <div class="glass-card p-5">
        <h3 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest">Drive Configuration</h3>

        <div class="space-y-4">
          <input id="speed" type="number" value="40">
          <input id="drivingHours" type="number" value="1.5">
          <input id="loadWeight" type="number" value="150">
          <input id="timeOfDay" type="range" min="0" max="24" value="12">

          <select id="slope">
            <option value="0">Flat</option>
            <option value="1">Uphill</option>
            <option value="2">Downhill</option>
          </select>

          <select id="environment">
            <option value="3">Normal</option>
            <option value="0">Summer</option>
            <option value="1">Winter</option>
            <option value="2">Rain</option>
          </select>

          <label><input id="vehicleOn" type="checkbox" checked> Vehicle</label>
          <label><input id="isCharging" type="checkbox"> Charging</label>
        </div>
      </div>

      <!-- Battery + Temp -->
      <div class="grid grid-cols-2 gap-3">
        <div class="glass-card p-4 text-center">
          <p>Battery SOC</p>
          <div><span id="outSoc">--</span>%</div>
        </div>
        <div class="glass-card p-4 text-center">
          <p>Temperature</p>
          <div><span id="outTemp">--</span>°C</div>
        </div>
      </div>

      <!-- 🔥 NEW BATTERY STATUS -->
      <div class="glass-card p-4 text-center">
        <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Battery Status</p>
        <div id="batteryStatus" class="text-lg font-bold text-green-400">
          NORMAL
        </div>
      </div>

    </aside>

    <!-- RIGHT PANEL -->
    <main class="lg:col-span-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Chart -->
        <div class="glass-card p-6">
          <h3>Capacity vs Range</h3>
          <canvas id="rangeChart"></canvas>

          <!-- 🔥 FINAL RANGE -->
          <div class="mt-4 text-center">
            <p>Final Range</p>
            <div><span id="outFinalRange">--</span> km</div>
          </div>
        </div>

        <!-- Drain -->
        <div class="glass-card p-6">
          <h3>Drain</h3>
          <canvas id="drainChart"></canvas>
        </div>

      </div>
    </main>

  </div>
</div>

<script>
let history = { labels: [], soc: [], range: [], drain: [] };

const rangeChart = new Chart(document.getElementById('rangeChart'), {
  type: 'line',
  data: { labels: history.labels, datasets: [{ data: history.soc }, { data: history.range }] }
});

const drainChart = new Chart(document.getElementById('drainChart'), {
  type: 'line',
  data: { labels: history.labels, datasets: [{ data: history.drain }] }
});

function updateDashboard() {
  fetch("/output")
    .then(res => res.json())
    .then(d => {

      if (!d.batteryCapacity && d.batteryCapacity !== 0) return;

      document.getElementById("outSoc").innerText = d.batteryCapacity.toFixed(1);
      document.getElementById("outTemp").innerText = d.currentTemp.toFixed(1);

      // 🔥 Final Range
      if (d.finalRange !== undefined)
        document.getElementById("outFinalRange").innerText = d.finalRange.toFixed(1);

      // 🔥 Battery Status Logic
      let status = "NORMAL";
      let color = "#22c55e";

      if (d.currentTemp > 60) {
        status = "THERMAL RUNAWAY";
        color = "#ef4444";
      } else if (d.currentTemp > 45) {
        status = "HIGH TEMPERATURE";
        color = "#f97316";
      } else if (d.currentTemp > 35) {
        status = "HEATING";
        color = "#eab308";
      }

      const el = document.getElementById("batteryStatus");
      el.innerText = status;
      el.style.color = color;

      let t = new Date().toLocaleTimeString();
      history.labels.push(t);
      history.soc.push(d.batteryCapacity);
      history.range.push(d.continuousRange);
      history.drain.push(d.batteryDrainRate);

      if (history.labels.length > 20) {
        history.labels.shift();
        history.soc.shift();
        history.range.shift();
        history.drain.shift();
      }

      rangeChart.update();
      drainChart.update();
    });
}

function sendToUnity() {
  const payload = {
    speed: parseFloat(speed.value),
    drivingHours: parseFloat(drivingHours.value),
    loadWeight: parseFloat(loadWeight.value),
    vehicleOn: vehicleOn.checked,
    slope: parseInt(slope.value),
    environment: parseInt(environment.value),
    timeOfDay: parseFloat(timeOfDay.value),
    isCharging: isCharging.checked
  };

  fetch("/data", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", sendToUnity);
});

setInterval(updateDashboard, 1000);
</script>

</body>
</html>
